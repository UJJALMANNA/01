import { useState } from 'react'
import { motion } from 'framer-motion'
import { FaPaperPlane, FaCheckCircle } from 'react-icons/fa'
import { submitQuery } from '../api/client.js'
import './Contact.css'

const initialForm = { name: '', email: '', subject: '', message: '' }

export default function Contact() {
  const [form, setForm] = useState(initialForm)
  const [status, setStatus] = useState('idle') // idle | sending | success | error
  const [errorMsg, setErrorMsg] = useState('')

  const handleChange = (e) => {
    setForm((prev) => ({ ...prev, [e.target.name]: e.target.value }))
  }

  const handleSubmit = async (e) => {
    e.preventDefault()
    setStatus('sending')
    setErrorMsg('')
    try {
      await submitQuery(form)
      setStatus('success')
      setForm(initialForm)
    } catch (err) {
      setStatus('error')
      setErrorMsg(
        err?.response?.data?.detail ||
          'Something went wrong sending your message. Please make sure the backend server is running.'
      )
    }
  }

  return (
    <div className="contact-page section">
      <div className="container contact-page__grid">
        <motion.div
          initial={{ opacity: 0, y: 16 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.5 }}
        >
          <p className="eyebrow">Let's Connect</p>
          <h1 className="section-heading">Send a Query</h1>
          <p className="contact-page__sub">
            Have a question about GATE preparation, M.Tech, or just want to say hi?
            Drop a message below — it goes straight into my inbox.
          </p>

          <ul className="contact-page__facts">
            <li><strong>Currently:</strong> M.Tech, C&amp;I, IIT Bhilai</li>
            <li><strong>Background:</strong> B.Tech, BBIT Kolkata (CGPA 8.08)</li>
            <li><strong>Achievement:</strong> GATE CS Qualifier — 2025 &amp; 2026</li>
          </ul>
        </motion.div>

        <motion.form
          className="card contact-form"
          onSubmit={handleSubmit}
          initial={{ opacity: 0, y: 16 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.5, delay: 0.15 }}
        >
          {status === 'success' ? (
            <div className="contact-form__success">
              <FaCheckCircle size={40} color="var(--success)" />
              <h3>Message sent</h3>
              <p>Thanks for reaching out — I'll get back to you soon.</p>
              <button type="button" className="btn btn-outline" onClick={() => setStatus('idle')}>
                Send another message
              </button>
            </div>
          ) : (
            <>
              <div className="form-row">
                <label htmlFor="name">Name</label>
                <input
                  id="name"
                  name="name"
                  type="text"
                  required
                  minLength={2}
                  value={form.name}
                  onChange={handleChange}
                  placeholder="Your full name"
                />
              </div>

              <div className="form-row">
                <label htmlFor="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  required
                  value={form.email}
                  onChange={handleChange}
                  placeholder="you@example.com"
                />
              </div>

              <div className="form-row">
                <label htmlFor="subject">Subject</label>
                <input
                  id="subject"
                  name="subject"
                  type="text"
                  required
                  minLength={2}
                  value={form.subject}
                  onChange={handleChange}
                  placeholder="What's this about?"
                />
              </div>

              <div className="form-row">
                <label htmlFor="message">Message</label>
                <textarea
                  id="message"
                  name="message"
                  required
                  minLength={5}
                  rows={6}
                  value={form.message}
                  onChange={handleChange}
                  placeholder="Write your message here..."
                />
              </div>

              {status === 'error' && <p className="contact-form__error">{errorMsg}</p>}

              <button type="submit" className="btn btn-primary contact-form__submit" disabled={status === 'sending'}>
                {status === 'sending' ? 'Sending…' : <>Send Message <FaPaperPlane size={13} /></>}
              </button>
            </>
          )}
        </motion.form>
      </div>
    </div>
  )
}
